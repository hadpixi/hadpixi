<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links - hadpixi.com</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/links.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <span class="brand-icon">✦</span>
                hadpixi.com
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="links.html" class="nav-link active">Links</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html" class="mobile-nav-link">Home</a>
        <a href="links.html" class="mobile-nav-link">Links</a>
    </div>

    <!-- Links Section -->
    <section class="links-section">
        <div class="container">
            <!-- Header -->
            <div class="links-header">
                <div class="header-content">
                    <h1 class="page-title">only /hadpixi</h1>
                    <p class="page-subtitle">Connect with me across all platforms</p>
                </div>

                <!-- Search Bar -->
                <div class="search-wrapper">
                    <div class="search-container">
                        <i class="fas fa-search search-icon"></i>
                        <input 
                            type="text" 
                            class="search-input" 
                            id="searchInput" 
                            placeholder="Search platforms..."
                        >
                        <button class="search-clear" id="clearSearch" style="display: none;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Filter Tags (Optional) -->
            <div class="filter-tags">
                <button class="filter-tag active" data-filter="all">All</button>
                <button class="filter-tag" data-filter="social">Social</button>
                <button class="filter-tag" data-filter="dev">Dev</button>
            </div>

            <!-- Links Grid -->
            <div class="links-grid" id="linksGrid">
                <!-- Generated by JavaScript -->
            </div>

            <!-- No Results -->
            <div class="no-results" id="noResults" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>No platforms found</h3>
                <p>Try a different search term</p>
            </div>
        </div>
    </section>

    <!-- Footer 
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 hadpixi.com. All rights reserved.</p>
        </div>
    </footer>
-->
    <script src="js/navigation.js"></script>
    <script src="js/links.js"></script>
</body>
</html>
